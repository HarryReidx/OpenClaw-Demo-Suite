services:
  portal:
    image: harbor.tsingyun.net/platform/ai-openclaw-dev-portal:1.0
    container_name: ai-openclaw-dev-portal
    restart: unless-stopped
    environment:
      APP_TARGET: portal
      APP_PORT: 8081
      APP_HOST: 0.0.0.0
      PORTAL_PORT: 8100
      BASIC_QA_PORT: 8101
      MEMORY_CHAT_PORT: 8102
      FILE_AGENT_PORT: 8103
      SEARCH_HTML_PORT: 8104
      MOBILE_OPENCLAW_PORT: 8105
      AI_NEWS_PUSH_PORT: 8106
      RAG_PORT: 8107
      QWEN_API_KEY: ${QWEN_API_KEY:-ollama}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-http://172.24.0.5:11434/v1}
      QWEN_TEXT_MODEL: ${QWEN_TEXT_MODEL:-qwen3:8b}
      QWEN_VISION_MODEL: ${QWEN_VISION_MODEL:-qwen2.5vl:7b}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      TAVILY_BASE_URL: ${TAVILY_BASE_URL:-https://api.tavily.com}
      WECHAT_WEBHOOK_URL: ${WECHAT_WEBHOOK_URL}
      CODEX_HOME: /app/.codex
    ports:
      - "8100:8081"
    volumes:
      - ./runtime/portal/codex:/app/.codex

  app01:
    image: harbor.tsingyun.net/platform/ai-openclaw-dev-01:1.0
    container_name: ai-openclaw-dev-01
    restart: unless-stopped
    environment: &common-env
      APP_PORT: 8081
      APP_HOST: 0.0.0.0
      PORTAL_PORT: 8100
      BASIC_QA_PORT: 8101
      MEMORY_CHAT_PORT: 8102
      FILE_AGENT_PORT: 8103
      SEARCH_HTML_PORT: 8104
      MOBILE_OPENCLAW_PORT: 8105
      AI_NEWS_PUSH_PORT: 8106
      RAG_PORT: 8107
      QWEN_API_KEY: ${QWEN_API_KEY:-ollama}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-http://172.24.0.5:11434/v1}
      QWEN_TEXT_MODEL: ${QWEN_TEXT_MODEL:-qwen3:8b}
      QWEN_VISION_MODEL: ${QWEN_VISION_MODEL:-qwen2.5vl:7b}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      TAVILY_BASE_URL: ${TAVILY_BASE_URL:-https://api.tavily.com}
      WECHAT_WEBHOOK_URL: ${WECHAT_WEBHOOK_URL}
      CODEX_HOME: /app/.codex
      APP_TARGET: "01"
    ports:
      - "8101:8081"
    volumes:
      - ./runtime/01/data:/app/data
      - ./runtime/01/demo_outputs:/app/demo_outputs
      - ./runtime/01/codex:/app/.codex

  app02:
    image: harbor.tsingyun.net/platform/ai-openclaw-dev-02:1.0
